{% extends "base.html" %}

{% block title %}Kanban de ideas{% endblock %}

{% block content %}
<section class="create-panel">
  <form
    hx-post="/ideas"
    hx-target="#board"
    hx-swap="outerHTML"
    class="new-idea-form"
  >
    <input type="text" name="title" placeholder="Nueva idea..." required maxlength="180" />
    <input type="text" name="description" placeholder="Descripcion (opcional)" />
    <select name="priority">
      <option value="low">Low</option>
      <option value="med" selected>Med</option>
      <option value="high">High</option>
    </select>
    <button type="submit">Guardar</button>
  </form>
</section>

{% include "partials/board.html" %}
{% endblock %}
