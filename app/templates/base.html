<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Ideas Board{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Idea Capture</h1>
      <p>Telegram + FastAPI + SQLite</p>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <script>
      (function () {
        var dragState = { card: null };

        function resolveBoard(scope) {
          if (!scope) {
            return document.querySelector("#board");
          }
          if (scope.id === "board") {
            return scope;
          }
          return scope.querySelector ? scope.querySelector("#board") : document.querySelector("#board");
        }

        function activateBoardTab(board, status) {
          var tabs = board.querySelectorAll("[data-board-tab]");
          var cols = board.querySelectorAll("[data-board-column]");

          tabs.forEach(function (tab) {
            var active = tab.getAttribute("data-board-tab") === status;
            tab.classList.toggle("is-active", active);
            tab.setAttribute("aria-selected", active ? "true" : "false");
          });

          cols.forEach(function (col) {
            var active = col.getAttribute("data-board-column") === status;
            col.classList.toggle("is-active", active);
          });
        }

        function initBoardTabs(root) {
          var board = resolveBoard(root || document);
          if (!board || board.dataset.tabsReady === "1") {
            return;
          }
          board.dataset.tabsReady = "1";

          board.addEventListener("click", function (event) {
            var button = event.target.closest("[data-board-tab]");
            if (!button) {
              return;
            }
            activateBoardTab(board, button.getAttribute("data-board-tab") || "inbox");
          });
        }

        function initDesktopDrag(board) {
          if (!board || board.dataset.dragReady === "1") {
            return;
          }
          board.dataset.dragReady = "1";

          board.addEventListener("dragstart", function (event) {
            var card = event.target.closest(".card[draggable='true']");
            if (!card || window.matchMedia("(max-width: 900px)").matches) {
              return;
            }
            dragState.card = card;
            card.classList.add("is-dragging");
            if (event.dataTransfer) {
              event.dataTransfer.effectAllowed = "move";
              event.dataTransfer.setData("text/plain", "card");
            }
          });

          board.addEventListener("dragend", function () {
            if (dragState.card) {
              dragState.card.classList.remove("is-dragging");
            }
            dragState.card = null;
            board.querySelectorAll("[data-dropzone]").forEach(function (col) {
              col.classList.remove("is-drop-target");
            });
          });

          board.addEventListener("dragover", function (event) {
            var column = event.target.closest("[data-dropzone]");
            if (!column || !dragState.card || window.matchMedia("(max-width: 900px)").matches) {
              return;
            }
            event.preventDefault();
            column.classList.add("is-drop-target");
            if (event.dataTransfer) {
              event.dataTransfer.dropEffect = "move";
            }
          });

          board.addEventListener("dragleave", function (event) {
            var column = event.target.closest("[data-dropzone]");
            if (!column) {
              return;
            }
            var related = event.relatedTarget;
            if (related && column.contains(related)) {
              return;
            }
            column.classList.remove("is-drop-target");
          });

          board.addEventListener("drop", function (event) {
            var column = event.target.closest("[data-dropzone]");
            if (!column || !dragState.card || window.matchMedia("(max-width: 900px)").matches) {
              return;
            }
            event.preventDefault();
            column.classList.remove("is-drop-target");

            var targetStatus = column.getAttribute("data-dropzone") || "inbox";
            var currentStatus = dragState.card.getAttribute("data-card-status") || "inbox";
            if (targetStatus === currentStatus) {
              return;
            }

            var form = dragState.card.querySelector(".move-form");
            var select = form ? form.querySelector("select[name='status']") : null;
            if (!form || !select) {
              return;
            }
            select.value = targetStatus;
            form.requestSubmit();
          });
        }

        function initBoardUX(root) {
          var board = resolveBoard(root || document);
          if (!board) {
            return;
          }
          initBoardTabs(board);
          initDesktopDrag(board);
        }

        document.addEventListener("DOMContentLoaded", function () {
          initBoardUX(document);
        });

        document.body.addEventListener("htmx:afterSwap", function () {
          initBoardUX(document);
        });

        document.body.addEventListener("htmx:afterSettle", function () {
          initBoardUX(document);
        });
      })();
    </script>
  </body>
</html>
